<div class="counter" [ngClass]="{ 'field-disabled': disabled() }">
  <div id="1442dc1bbf" class="btn-decrement" [ngClass]="{ disabled: !btnDecrement }" (click)="decrement()">
    <svg class="svg-margin" width="11" height="2">
      <rect width="11" height="2" style="fill: rgb(0, 0, 0)" />
    </svg>
  </div>
  <input
    id="6c4da60fbf"
    #inputField
    type="text"
    [disabled]="disabled()"
    autocomplete="off"
    [value]="counter | separator"
    (input)="onInput($event)"
  />
  <div id="eba38598f6" class="btn-increment" [ngClass]="{ disabled: !btnIncrement }" (click)="increment()">
    <svg class="svg-margin" width="11" height="11">
      <polygon points="5.5,5.5 5.5,0 5.5,5.5 5.5,5.5 11.0,5.5 5.5,5.5 5.5,11.0 5.5,5.5 5.5,5.5 0,5.5 0,5.5 5.5,5.5" style="stroke: black" />
    </svg>
  </div>
</div>
