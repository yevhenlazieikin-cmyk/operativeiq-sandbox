<mat-tab-group
  class="tabber"
  [ngClass]="{'administration': typeMenu() === menuTypeEnum.administration, 'operation': typeMenu() === menuTypeEnum.operation}"
  [animationDuration]="'0ms'"
  headerPosition="above"
  mat-stretch-tabs="false"
  mat-align-tabs="start"
  [selectedIndex]="selectedIndex()"
  (selectedIndexChange)="onSelectedIndexChanged($event)"
>
  @for(tab of tabs(); track tab.label){
  <mat-tab [label]="tab.label" [disabled]="tab.disabled || false">
    <ng-container *ngTemplateOutlet="tab.content"></ng-container>
  </mat-tab>
  }
</mat-tab-group>
