name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_href:
        description: 'Base href (e.g. /operativeiq-sandbox/)'
        default: '/operativeiq-sandbox/'
        type: string

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git for private GitLab submodule
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_ACCESS_TOKEN }}
        run: |
          git config --global url."https://oauth2:${GITLAB_TOKEN}@git.operativeiq.com/".insteadOf "https://git.operativeiq.com/"

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npx ng build --configuration production --base-href "${{ inputs.base_href || '/operativeiq-sandbox/' }}"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/sandbox-app/browser
